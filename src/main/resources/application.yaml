spring:
  application:
    name: baseapp
  security:
    oauth2:
      client:
        provider:
          keycloak:
            user-name-attribute: 'preferred_username'
            issuer-uri: 'http://localhost:8082/realms/baseapp'
        registration:
          keycloak:
            client-id: 'baseapp'
            client-secret: 'gxzwQxuwQzZlLEdNZD5pK2GBpAIMrYiy'
            authorization-grant-type: 'authorization_code'
            scope: 'openid'
  web:
    error:
      whitelabel:
        enabled: true
      path: /error

  freemarker:
    cache: false
    request-context-attribute: rc
    expose-request-attributes: true
    settings:
      template_exception_handler: rethrow
      #expose-session-attributes: true
    template-loader-path:
      - classpath:/
      - classpath:/templates/

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/baseapp
    username: baseapp
    password: baseapp

  flyway:
    baseline-on-migrate: true

server:
  port: 8080

management:
  info:
    git:
      mode: full
  server:
    port: 8081
  endpoints:
    web:
      base-path: /
      exposure:
        include: '*'

logging:
  pattern:
    console: "%clr(%d{${LOG_DATEFORMAT_PATTERN:yyyy-MM-dd'T'HH:mm:ss.SSSXXX}}){white} %clr(${LOG_LEVEL_PATTERN:%.-1p}) %clr(${PID:-}){magenta}%clr(%X{request_id_formatted}){black} %clr(%esb{APPLICATION_GROUP}%clr([%20.20t]){blue} ${LOG_CORRELATION_PATTERN:}){faint}%clr(%-50.50logger{49}){cyan}%clr(:){white} %clr(%m){bright_white}%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}}"
  level:
    root: WARN
    info.maila: TRACE
    org.springframework: INFO
    org.springframework.security.web.csrf.CsrfFilter: DEBUG
    org.springframework.security.web.access.intercept.FilterSecurityInterceptor: TRACE
    org.springframework.web.servlet.DispatcherServlet: INFO
    org.springframework.web.servlet.mvc.method.annotation.HttpEntityMethodProcessor: DEBUG
    org.flywaydb: TRACE
    org.flywaydb.core.internal.scanner: INFO
    org.springdoc: ERROR